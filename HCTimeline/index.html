<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Headcovering Timeline</title>

  <meta
    name="description"
    content="A timeline of historical works and views related to Christian head covering and 1 Corinthians 11:2–16."
  >

  <link rel="icon" href="data:,">
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
  >

  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f7f7;
      --border: #000000;
      --border-light: #d7d7d7;
      --text: #000000;
      --muted: #555555;
      --faint: #999999;
      --error: #8a1f1f;
      --max-width: 980px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: light;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      padding: 48px 24px 64px;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .eyebrow,
    .section-label {
      color: var(--faint);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .site-header h1 {
      margin-top: 6px;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    .intro {
      max-width: 660px;
      margin: 8px auto 0;
      color: var(--faint);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .site-header::after {
      content: "";
      display: block;
      width: 40px;
      height: 1px;
      margin: 16px auto 0;
      background: var(--border);
    }

    .timeline-panel {
      padding: 22px 24px 18px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .timeline-heading,
    .details-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .selected-year {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.7rem, 5vw, 2.35rem);
      font-weight: 600;
      letter-spacing: -0.035em;
      line-height: 1;
    }

    .timeline-status {
      margin-top: 2px;
      color: var(--faint);
      font-size: 0.74rem;
      text-align: right;
    }

    .timeline-status.error {
      color: var(--error);
    }

    .slider-wrap {
      margin-top: 24px;
    }

    #yearSlider {
      width: 100%;
      height: 20px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    #yearSlider:focus {
      outline: none;
    }

    #yearSlider:disabled {
      cursor: wait;
      opacity: 0.45;
    }

    #yearSlider::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: var(--border);
    }

    #yearSlider::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      margin-top: -6px;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
    }

    #yearSlider::-moz-range-track {
      width: 100%;
      height: 2px;
      background: var(--border);
    }

    #yearSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
    }

    #yearSlider:focus-visible::-webkit-slider-thumb {
      outline: 2px solid var(--border);
      outline-offset: 3px;
    }

    #yearSlider:focus-visible::-moz-range-thumb {
      outline: 2px solid var(--border);
      outline-offset: 3px;
    }

    .tick-row {
      position: relative;
      height: 16px;
      margin: 2px 7px 0;
    }

    .tick {
      position: absolute;
      top: 2px;
      width: 1px;
      height: 6px;
      background: var(--border-light);
      transform: translateX(-50%);
    }

    .tick.major {
      height: 10px;
      background: var(--border);
    }

    .timeline-range {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: var(--faint);
      font-size: 0.68rem;
    }

    .details {
      margin-top: 36px;
    }

    .details-heading {
      align-items: end;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    #yearHeading {
      margin-top: 3px;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .details-tools {
      padding-bottom: 2px;
    }

    .core-filter {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.72rem;
      cursor: pointer;
      user-select: none;
    }

    .core-filter input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: var(--text);
    }

    .works {
      display: grid;
      gap: 12px;
    }

    .work-card {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--border-light);
      background: var(--surface);
      transition:
        border-color 0.15s ease,
        background 0.15s ease;
    }

    .work-card:hover {
      border-color: var(--border);
      background: var(--surface-soft);
    }

    .work-card.core-entry {
      border-color: var(--border);
    }

    .work-image-wrap {
      position: relative;
      width: 88px;
      min-height: 112px;
    }

    .work-image {
      display: block;
      width: 88px;
      height: 112px;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      object-fit: cover;
      filter: grayscale(100%);
    }

    .image-fallback {
      display: none;
      width: 88px;
      height: 112px;
      place-items: center;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      color: var(--faint);
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-align: center;
      text-transform: uppercase;
    }

    .work-year {
      margin-bottom: 3px;
      color: var(--faint);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .work-author {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .work-title {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .work-excerpt {
      margin-top: 14px;
      padding: 12px 14px;
      border-left: 2px solid var(--border);
      background: var(--surface-soft);
      color: #333333;
      font-size: 0.79rem;
      line-height: 1.65;
    }

    .work-excerpt::before {
      content: "“";
    }

    .work-excerpt::after {
      content: "”";
    }

    .work-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 3px 8px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge.core {
      border-color: var(--border);
      background: var(--text);
      color: #ffffff;
    }

    .work-source {
      display: inline-block;
      margin-top: 13px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      text-decoration: none;
    }

    .work-source:hover,
    .work-source:focus-visible {
      color: var(--muted);
    }

    .work-source:focus-visible {
      outline: 1px solid var(--border);
      outline-offset: 4px;
    }

    .message {
      padding: 28px 20px;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      color: var(--faint);
      font-size: 0.82rem;
      text-align: center;
    }

    .message.error {
      border-color: var(--error);
      color: var(--error);
    }

    .retry-button {
      margin-top: 14px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition:
        background 0.15s ease,
        color 0.15s ease;
    }

    .retry-button:hover,
    .retry-button:focus-visible {
      background: var(--text);
      color: #ffffff;
    }

    .retry-button[hidden] {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 14px 48px;
      }

      .site-header {
        margin-bottom: 30px;
      }

      .timeline-panel {
        padding: 18px 16px 15px;
      }

      .timeline-heading,
      .details-heading {
        display: block;
      }

      .timeline-status {
        margin-top: 7px;
        text-align: left;
      }

      .details-tools {
        margin-top: 10px;
      }

      .work-card {
        grid-template-columns: 62px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .work-image-wrap,
      .work-image,
      .image-fallback {
        width: 62px;
      }

      .work-image,
      .image-fallback {
        height: 82px;
      }

      .work-author {
        font-size: 0.92rem;
      }

      .work-title,
      .work-excerpt {
        font-size: 0.76rem;
      }
    }
  </style>
</head>

<body>
  <main
    class="page"
    id="timelineApp"
    data-json="./data.json"
  >
    <header class="site-header">
      <p class="eyebrow">1 Corinthians 11:2–16</p>
      <h1>Headcovering Timeline</h1>

      <p class="intro">
        Select a dated point to view writers, church texts, laws,
        commentaries, and later studies on Christian head covering.
      </p>
    </header>

    <section
      class="timeline-panel"
      aria-labelledby="timelineTitle"
    >
      <div class="timeline-heading">
        <div>
          <p class="section-label" id="timelineTitle">
            Timeline
          </p>

          <output
            class="selected-year"
            id="selectedYear"
            for="yearSlider"
          >
            —
          </output>
        </div>

        <p
          class="timeline-status"
          id="timelineStatus"
          aria-live="polite"
        >
          Loading data…
        </p>
      </div>

      <div class="slider-wrap">
        <input
          type="range"
          id="yearSlider"
          min="0"
          max="0"
          value="0"
          step="1"
          aria-label="Select a timeline year"
          disabled
        >

        <div
          class="tick-row"
          id="tickRow"
          aria-hidden="true"
        ></div>
      </div>

      <div class="timeline-range">
        <span id="firstYear">—</span>
        <span id="lastYear">—</span>
      </div>
    </section>

    <section
      class="details"
      aria-labelledby="yearHeading"
    >
      <div class="details-heading">
        <div>
          <p class="section-label">Selected year</p>
          <h2 id="yearHeading">Loading</h2>
        </div>

        <div class="details-tools">
          <label class="core-filter" for="coreOnly">
            <input
              type="checkbox"
              id="coreOnly"
            >
            Core entries only
          </label>
        </div>
      </div>

      <div
        id="works"
        class="works"
        aria-live="polite"
      >
        <p class="message">Loading timeline data…</p>
      </div>

      <button
        class="retry-button"
        id="retryButton"
        type="button"
        hidden
      >
        Try again
      </button>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const app =
        document.getElementById("timelineApp");

      const yearSlider =
        document.getElementById("yearSlider");

      const selectedYear =
        document.getElementById("selectedYear");

      const firstYear =
        document.getElementById("firstYear");

      const lastYear =
        document.getElementById("lastYear");

      const tickRow =
        document.getElementById("tickRow");

      const timelineStatus =
        document.getElementById("timelineStatus");

      const yearHeading =
        document.getElementById("yearHeading");

      const worksContainer =
        document.getElementById("works");

      const coreOnly =
        document.getElementById("coreOnly");

      const retryButton =
        document.getElementById("retryButton");

      const viewLabels = {
        material_veil_required: "Material veil required",
        material_veil_expected: "Material veil expected",
        cultural_symbol: "Cultural symbol",
        hair_only: "Hair only",
        no_requirement: "No requirement",
        indirect_witness: "Indirect witness",
        related_dress_evidence: "Related dress evidence"
      };

      let years = [];
      let itemsByYear = new Map();
      let selectedIndex = 0;

      function setStatus(message, type = "") {
        timelineStatus.textContent = message;
        timelineStatus.className =
          `timeline-status ${type}`.trim();
      }

      function formatView(view) {
        return (
          viewLabels[view] ||
          String(view || "Unknown")
            .replace(/[_-]+/g, " ")
            .replace(
              /\b\w/g,
              letter => letter.toUpperCase()
            )
        );
      }

      function getDataUrl() {
        const path =
          app.dataset.json?.trim() ||
          "./data.json";

        return new URL(
          path,
          document.baseURI
        ).href;
      }

      async function loadJson() {
        const url = getDataUrl();

        const response = await fetch(url, {
          cache: "no-store",
          headers: {
            Accept: "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(
            `Could not load data.json: ${response.status} ${response.statusText}`
          );
        }

        const text =
          await response.text();

        let payload;

        try {
          payload = JSON.parse(text);
        } catch {
          throw new Error(
            "data.json is not valid JSON"
          );
        }

        if (
          !payload ||
          !Array.isArray(payload.items)
        ) {
          throw new Error(
            'data.json must contain an "items" array'
          );
        }

        return payload.items;
      }

      function normalizeItem(item) {
        const year =
          Number(item?.year);

        if (
          !item ||
          typeof item !== "object" ||
          !Number.isFinite(year)
        ) {
          return null;
        }

        return {
          year,
          author:
            String(
              item.author ||
              "Unknown author"
            ),
          work:
            String(
              item.work ||
              "Untitled work"
            ),
          view:
            String(
              item.view ||
              "unknown"
            ),
          note:
            String(
              item.note ||
              ""
            ),
          url:
            String(
              item.url ||
              ""
            ),
          image:
            String(
              item.image ||
              ""
            ),
          primary:
            item.primary === true,
          excerpt:
            String(
              item.excerpt ||
              ""
            )
        };
      }

      function prepareItems(items) {
        const cleanItems = items
          .map(normalizeItem)
          .filter(Boolean)
          .sort((a, b) => {
            if (a.year !== b.year) {
              return a.year - b.year;
            }

            return a.author.localeCompare(
              b.author,
              undefined,
              { sensitivity: "base" }
            );
          });

        itemsByYear = new Map();

        cleanItems.forEach(item => {
          if (!itemsByYear.has(item.year)) {
            itemsByYear.set(item.year, []);
          }

          itemsByYear
            .get(item.year)
            .push(item);
        });

        years = [
          ...itemsByYear.keys()
        ].sort((a, b) => a - b);

        if (years.length === 0) {
          throw new Error(
            "No valid dated items were found"
          );
        }
      }

      function createBadge(
        text,
        className = ""
      ) {
        const badge =
          document.createElement("span");

        badge.className =
          `badge ${className}`.trim();

        badge.textContent = text;

        return badge;
      }

      function createImage(item) {
        const wrap =
          document.createElement("div");

        wrap.className =
          "work-image-wrap";

        const image =
          document.createElement("img");

        image.className =
          "work-image";

        image.alt =
          item.author
            ? `Image for ${item.author}`
            : "";

        image.loading = "lazy";
        image.decoding = "async";

        const fallback =
          document.createElement("div");

        fallback.className =
          "image-fallback";

        fallback.textContent =
          "No image";

        function showFallback() {
          image.style.display = "none";
          fallback.style.display = "grid";
        }

        image.addEventListener(
          "error",
          showFallback
        );

        if (item.image) {
          image.src = item.image;
        } else {
          showFallback();
        }

        wrap.append(
          image,
          fallback
        );

        return wrap;
      }

      function createWorkCard(item) {
        const article =
          document.createElement("article");

        article.className =
          "work-card";

        if (item.primary) {
          article.classList.add(
            "core-entry"
          );
        }

        const content =
          document.createElement("div");

        const year =
          document.createElement("p");

        year.className =
          "work-year";

        year.textContent =
          `${item.year} CE`;

        const author =
          document.createElement("h3");

        author.className =
          "work-author";

        author.textContent =
          item.author;

        const work =
          document.createElement("p");

        work.className =
          "work-title";

        work.textContent =
          item.work;

        content.append(
          year,
          author,
          work
        );

        if (item.excerpt) {
          const excerpt =
            document.createElement("blockquote");

          excerpt.className =
            "work-excerpt";

          excerpt.textContent =
            item.excerpt;

          content.appendChild(excerpt);
        }

        const badges =
          document.createElement("div");

        badges.className =
          "work-badges";

        badges.appendChild(
          createBadge(
            formatView(item.view)
          )
        );

        if (item.note) {
          badges.appendChild(
            createBadge(item.note)
          );
        }

        if (item.primary) {
          badges.appendChild(
            createBadge(
              "Core entry",
              "core"
            )
          );
        }

        content.appendChild(badges);

        if (item.url) {
          const link =
            document.createElement("a");

          link.className =
            "work-source";

          link.href = item.url;
          link.target = "_blank";
          link.rel =
            "noopener noreferrer";

          link.textContent =
            "Open source";

          content.appendChild(link);
        }

        article.append(
          createImage(item),
          content
        );

        return article;
      }

      function getVisibleItems(year) {
        const items =
          itemsByYear.get(year) || [];

        if (!coreOnly.checked) {
          return items;
        }

        return items.filter(
          item => item.primary
        );
      }

      function renderSelectedYear() {
        const year =
          years[selectedIndex];

        if (year === undefined) {
          return;
        }

        const allItems =
          itemsByYear.get(year) || [];

        const visibleItems =
          getVisibleItems(year);

        yearSlider.value =
          String(selectedIndex);

        selectedYear.textContent =
          `${year} CE`;

        yearHeading.textContent =
          `${year} CE`;

        setStatus(
          `${allItems.length} ${
            allItems.length === 1
              ? "work"
              : "works"
          }`
        );

        worksContainer.replaceChildren();

        if (visibleItems.length === 0) {
          const message =
            document.createElement("p");

          message.className =
            "message";

          message.textContent =
            coreOnly.checked
              ? "No core entries are marked for this year."
              : "No works are listed for this year.";

          worksContainer.appendChild(
            message
          );

          return;
        }

        const fragment =
          document.createDocumentFragment();

        visibleItems.forEach(item => {
          fragment.appendChild(
            createWorkCard(item)
          );
        });

        worksContainer.appendChild(
          fragment
        );
      }

      function buildTicks() {
        tickRow.replaceChildren();

        const denominator =
          Math.max(years.length - 1, 1);

        years.forEach((year, index) => {
          const tick =
            document.createElement("span");

          const percentage =
            (index / denominator) * 100;

          tick.className = "tick";

          if (
            index === 0 ||
            index === years.length - 1 ||
            index % 5 === 0
          ) {
            tick.classList.add("major");
          }

          tick.style.left =
            `${percentage}%`;

          tick.title =
            `${year} CE`;

          tickRow.appendChild(tick);
        });
      }

      function setupTimeline() {
        selectedIndex = 0;

        yearSlider.min = "0";
        yearSlider.max =
          String(years.length - 1);
        yearSlider.step = "1";
        yearSlider.value = "0";
        yearSlider.disabled = false;

        firstYear.textContent =
          `${years[0]} CE`;

        lastYear.textContent =
          `${years[years.length - 1]} CE`;

        buildTicks();
        renderSelectedYear();
      }

      function showError(error) {
        console.error(error);

        yearSlider.disabled = true;
        selectedYear.textContent = "—";
        yearHeading.textContent =
          "Data could not be loaded";

        setStatus(
          "Timeline unavailable",
          "error"
        );

        worksContainer.replaceChildren();

        const message =
          document.createElement("p");

        message.className =
          "message error";

        message.textContent =
          `${error.message}. Keep data.json in the same folder as this HTML file.`;

        worksContainer.appendChild(
          message
        );

        retryButton.hidden = false;
      }

      async function initialize() {
        retryButton.hidden = true;
        yearSlider.disabled = true;
        selectedYear.textContent = "—";
        yearHeading.textContent = "Loading";
        firstYear.textContent = "—";
        lastYear.textContent = "—";

        setStatus("Loading data…");

        worksContainer.innerHTML =
          '<p class="message">Loading timeline data…</p>';

        try {
          const items =
            await loadJson();

          prepareItems(items);
          setupTimeline();
        } catch (error) {
          showError(error);
        }
      }

      yearSlider.addEventListener(
        "input",
        event => {
          selectedIndex =
            Number(event.target.value);

          renderSelectedYear();
        }
      );

      coreOnly.addEventListener(
        "change",
        renderSelectedYear
      );

      retryButton.addEventListener(
        "click",
        initialize
      );

      initialize();
    })();
  </script>
</body>
</html>
