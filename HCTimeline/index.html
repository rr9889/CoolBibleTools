<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="description"
    content="A timeline of works related to head covering and 1 Corinthians 11:2–16."
  >

  <title>Headcovering Timeline</title>
  <link rel="icon" href="data:,">

  <style>
:root {
  --background: #f5f3ef;
  --surface: #ffffff;
  --surface-soft: #f0edf2;
  --text: #28242c;
  --muted: #706a75;
  --border: #ddd8e0;
  --accent: #3b2a4a;
  --accent-soft: #e9e1ed;
  --success-soft: #e4eee7;
  --error: #922f2f;
  --error-soft: #f6e5e5;
  --shadow: 0 12px 30px rgba(38, 29, 45, 0.07);
  --radius: 14px;
}

* {
  box-sizing: border-box;
}

html {
  color-scheme: light;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--background);
  color: var(--text);
  font-family:
    Arial,
    Helvetica,
    sans-serif;
  line-height: 1.5;
}

button,
input {
  font: inherit;
}

a {
  color: var(--accent);
}

.page {
  width: min(920px, calc(100% - 32px));
  margin: 0 auto;
  padding: 52px 0 72px;
}

.site-header {
  margin-bottom: 30px;
}

.eyebrow,
.section-label {
  margin: 0;
  color: var(--accent);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

h1 {
  margin: 6px 0 0;
  font-size: clamp(34px, 7vw, 54px);
  line-height: 1.04;
  letter-spacing: -0.04em;
}

.intro {
  max-width: 700px;
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 17px;
}

.timeline-panel,
.work-card,
.message {
  border: 1px solid var(--border);
  background: var(--surface);
}

.timeline-panel {
  padding: 22px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.timeline-heading,
.details-heading {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
}

.selected-year {
  display: block;
  margin-top: 4px;
  color: var(--accent);
  font-size: clamp(30px, 6vw, 42px);
  font-weight: 800;
  line-height: 1;
}

.timeline-status {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 14px;
  text-align: right;
}

.timeline-status.error {
  color: var(--error);
}

.slider-wrap {
  margin-top: 25px;
}

#yearSlider {
  width: 100%;
  margin: 0;
  accent-color: var(--accent);
  cursor: pointer;
}

#yearSlider:disabled {
  cursor: wait;
  opacity: 0.55;
}

.tick-row {
  position: relative;
  height: 18px;
  margin: 3px 8px 0;
}

.tick {
  position: absolute;
  top: 3px;
  width: 2px;
  height: 8px;
  border-radius: 2px;
  background: #aaa2ad;
  transform: translateX(-50%);
}

.tick.major {
  height: 13px;
  background: var(--accent);
}

.timeline-range {
  display: flex;
  justify-content: space-between;
  margin-top: 2px;
  color: var(--muted);
  font-size: 13px;
}

.details {
  margin-top: 30px;
}

.details-heading {
  margin-bottom: 15px;
}

#yearHeading {
  margin: 3px 0 0;
  font-size: 30px;
  line-height: 1.15;
}

.details-tools {
  padding-top: 5px;
}

.primary-filter {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
}

.primary-filter input {
  width: 17px;
  height: 17px;
  margin: 0;
  accent-color: var(--accent);
}

.works {
  display: grid;
  gap: 14px;
}

.work-card {
  display: grid;
  grid-template-columns: 92px minmax(0, 1fr);
  gap: 18px;
  padding: 18px;
  border-radius: var(--radius);
  box-shadow: 0 3px 12px rgba(38, 29, 45, 0.03);
}

.work-card.primary-work {
  border-left: 4px solid var(--accent);
  padding-left: 15px;
}

.work-image-wrap {
  width: 92px;
}

.work-image {
  display: block;
  width: 92px;
  height: 118px;
  border: 1px solid var(--border);
  border-radius: 9px;
  background: var(--surface-soft);
  object-fit: cover;
}

.work-year {
  margin: 0 0 3px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.work-author {
  margin: 0;
  font-size: 21px;
  line-height: 1.25;
}

.work-title {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 15px;
}

.work-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 13px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 4px 9px;
  border-radius: 999px;
  background: var(--surface-soft);
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
}

.badge.primary {
  background: var(--accent-soft);
  color: var(--accent);
}

.badge.secondary {
  background: #ececec;
  color: #56505a;
}

.badge.view-material_veil_required {
  background: #eadfea;
}

.badge.view-material_veil_expected {
  background: #e7e2ed;
}

.badge.view-cultural_symbol {
  background: #e6ebf2;
}

.badge.view-hair_only {
  background: #ece8d9;
}

.badge.view-no_requirement {
  background: var(--success-soft);
}

.work-source {
  display: inline-block;
  margin-top: 14px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 800;
  text-decoration: none;
}

.work-source:hover,
.work-source:focus-visible {
  text-decoration: underline;
}

.message {
  padding: 28px 20px;
  border-style: dashed;
  border-radius: var(--radius);
  color: var(--muted);
  text-align: center;
}

.message.error {
  border-color: #d8b3b3;
  background: var(--error-soft);
  color: var(--error);
}

.retry-button {
  margin-top: 14px;
  padding: 10px 15px;
  border: 0;
  border-radius: 8px;
  background: var(--accent);
  color: #ffffff;
  font-weight: 700;
  cursor: pointer;
}

.retry-button:hover,
.retry-button:focus-visible {
  filter: brightness(1.08);
}

.retry-button[hidden] {
  display: none;
}

@media (max-width: 640px) {
  .page {
    width: min(100% - 22px, 920px);
    padding: 30px 0 52px;
  }

  .timeline-panel {
    padding: 18px;
  }

  .timeline-heading,
  .details-heading {
    display: block;
  }

  .timeline-status {
    margin-top: 7px;
    text-align: left;
  }

  .details-tools {
    margin-top: 12px;
  }

  .work-card {
    grid-template-columns: 65px minmax(0, 1fr);
    gap: 12px;
    padding: 14px;
  }

  .work-card.primary-work {
    padding-left: 11px;
  }

  .work-image-wrap,
  .work-image {
    width: 65px;
  }

  .work-image {
    height: 86px;
  }

  .work-author {
    font-size: 18px;
  }
}

@media (prefers-color-scheme: dark) {
  :root {
    --background: #171519;
    --surface: #211e23;
    --surface-soft: #2c2730;
    --text: #f1edf3;
    --muted: #b8b0bb;
    --border: #3d3740;
    --accent: #d1b4df;
    --accent-soft: #3d2f45;
    --success-soft: #29392e;
    --error: #f1a4a4;
    --error-soft: #3c2727;
    --shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
  }

  html {
    color-scheme: dark;
  }

  .badge.secondary {
    background: #343036;
    color: #d4ced7;
  }

  .badge.view-material_veil_required,
  .badge.view-material_veil_expected,
  .badge.view-cultural_symbol,
  .badge.view-hair_only {
    background: #332d38;
  }
}

  </style>
</head>

<body>
  <main
    id="timelineApp"
    data-json="./data.json"
  >
    <div id="page">
      <header class="site-header">
        <p class="eyebrow">1 Corinthians 11:2–16</p>

        <h1 class="site-title">
          Head Covering Timeline
        </h1>

        <p class="intro">
          Move through the timeline to view works linked to each year.
        </p>
      </header>

      <section
        class="timeline"
        aria-labelledby="timelineHeading"
      >
        <div class="banner" id="timelineHeading">
          Select a year
        </div>

        <output
          class="year-output"
          id="yearOutput"
          for="yearSlider"
        >
          —
        </output>

        <input
          type="range"
          id="yearSlider"
          min="0"
          max="0"
          value="0"
          step="1"
          aria-label="Selected year"
          disabled
        >

        <div class="range-labels">
          <span id="rangeStart">—</span>
          <span id="rangeEnd">—</span>
        </div>
      </section>

      <section
        class="details"
        aria-live="polite"
      >
        <div class="details-header">
          <h2 id="yearHeading">Loading</h2>
          <p class="status" id="status">Loading data…</p>
        </div>

        <div id="works">
          <p class="empty">Loading data…</p>
        </div>

        <button
          type="button"
          id="retryButton"
          hidden
        >
          Try again
        </button>
      </section>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const app = document.getElementById("timelineApp");
      const yearSlider = document.getElementById("yearSlider");
      const yearOutput = document.getElementById("yearOutput");
      const rangeStart = document.getElementById("rangeStart");
      const rangeEnd = document.getElementById("rangeEnd");
      const yearHeading = document.getElementById("yearHeading");
      const works = document.getElementById("works");
      const status = document.getElementById("status");
      const retryButton = document.getElementById("retryButton");

      let years = [];
      let recordsByYear = new Map();

      function setStatus(message, type = "") {
        status.textContent = message;
        status.className = `status ${type}`.trim();
      }

      function unique(values) {
        return [...new Set(values.filter(Boolean))];
      }

      function buildCandidateUrls(path) {
        const suppliedPath = path || "./data.json";

        const urls = [
          new URL(suppliedPath, document.baseURI).href
        ];

        const pathParts = location.pathname
          .split("/")
          .filter(Boolean);

        /*
         * GitHub Pages project fallback:
         * /CoolBibleTools/data.json
         */
        if (pathParts.length > 0) {
          urls.push(
            new URL(
              `/${pathParts[0]}/data.json`,
              location.origin
            ).href
          );
        }

        /*
         * Root-site fallback:
         * /data.json
         */
        urls.push(
          new URL("/data.json", location.origin).href
        );

        return unique(urls);
      }

      async function fetchJson(path) {
        const errors = [];

        for (const url of buildCandidateUrls(path)) {
          try {
            const response = await fetch(url, {
              cache: "no-store",
              headers: {
                Accept: "application/json"
              }
            });

            if (!response.ok) {
              throw new Error(
                `${response.status} ${response.statusText}`
              );
            }

            const text = await response.text();

            try {
              return JSON.parse(text);
            } catch {
              throw new Error(
                "The fetched file is not valid JSON"
              );
            }
          } catch (error) {
            errors.push(`${url}: ${error.message}`);
          }
        }

        throw new Error(errors.join(" | "));
      }

      function normalizePayload(payload) {
        if (Array.isArray(payload)) {
          return payload;
        }

        if (!payload || typeof payload !== "object") {
          throw new Error(
            "data.json must contain an array or object."
          );
        }

        const arrayNames = [
          "works",
          "items",
          "data",
          "records",
          "entries"
        ];

        for (const name of arrayNames) {
          if (Array.isArray(payload[name])) {
            return payload[name];
          }
        }

        const entries = Object.entries(payload);

        const groupedArrays = entries.filter(
          ([, value]) => Array.isArray(value)
        );

        /*
         * Supports this shape:
         *
         * {
         *   "150": [{ ... }],
         *   "200": [{ ... }]
         * }
         */
        if (
          groupedArrays.length > 0 &&
          groupedArrays.length === entries.length
        ) {
          return groupedArrays.flatMap(
            ([groupYear, items]) =>
              items.map(item => ({
                ...item,
                year: item.year ?? groupYear
              }))
          );
        }

        throw new Error(
          "No record list was found in data.json."
        );
      }

      function extractYear(record) {
        const possibleValues = [
          record.year,
          record.sortYear,
          record.startYear,
          record.date,
          record.dating,
          record.dateRange
        ];

        for (const value of possibleValues) {
          if (
            value !== null &&
            value !== "" &&
            Number.isFinite(Number(value))
          ) {
            return Number(value);
          }

          if (typeof value !== "string") {
            continue;
          }

          /*
           * Reads years from values such as:
           * "150 CE"
           * "c. 150 CE"
           * "150–175 CE"
           */
          const match = value.match(/\b(\d{1,4})\b/);

          if (match) {
            return Number(match[1]);
          }
        }

        return null;
      }

      function prepareRecords(records) {
        recordsByYear = new Map();

        records.forEach((record, index) => {
          if (
            !record ||
            typeof record !== "object" ||
            Array.isArray(record)
          ) {
            return;
          }

          const year = extractYear(record);

          if (year === null) {
            console.warn(
              `Record ${index + 1} has no usable year:`,
              record
            );

            return;
          }

          if (!recordsByYear.has(year)) {
            recordsByYear.set(year, []);
          }

          recordsByYear.get(year).push(record);
        });

        years = [...recordsByYear.keys()]
          .sort((a, b) => a - b);

        if (years.length === 0) {
          throw new Error(
            "No records contain a usable year."
          );
        }
      }

      function titleCase(value) {
        return String(value)
          .replace(/[_-]+/g, " ")
          .replace(
            /\b\w/g,
            letter => letter.toUpperCase()
          );
      }

      function appendValue(container, value) {
        if (Array.isArray(value)) {
          const list = document.createElement("ul");

          value.forEach(item => {
            const listItem = document.createElement("li");

            listItem.textContent =
              item && typeof item === "object"
                ? JSON.stringify(item)
                : String(item);

            list.appendChild(listItem);
          });

          container.appendChild(list);
          return;
        }

        if (value && typeof value === "object") {
          const pre = document.createElement("pre");
          pre.textContent = JSON.stringify(value, null, 2);
          container.appendChild(pre);
          return;
        }

        container.append(String(value));
      }

      function createWorkCard(record) {
        const article = document.createElement("article");
        article.className = "work-card";

        const title = document.createElement("h3");

        title.textContent =
          record.title ||
          record.name ||
          record.work ||
          "Untitled work";

        article.appendChild(title);

        const summary =
          record.description ||
          record.summary ||
          record.excerpt;

        if (summary) {
          const paragraph = document.createElement("p");
          paragraph.className = "summary";
          paragraph.textContent = summary;
          article.appendChild(paragraph);
        }

        const hiddenKeys = new Set([
          "id",
          "title",
          "name",
          "work",
          "year",
          "sortYear",
          "startYear",
          "description",
          "summary",
          "excerpt"
        ]);

        const details = document.createElement("dl");

        Object.entries(record).forEach(
          ([key, value]) => {
            if (
              hiddenKeys.has(key) ||
              value === null ||
              value === undefined ||
              value === ""
            ) {
              return;
            }

            const term = document.createElement("dt");
            term.textContent = titleCase(key);

            const description =
              document.createElement("dd");

            const isLink =
              /^(url|link|sourceUrl)$/i.test(key) &&
              typeof value === "string";

            if (isLink) {
              const anchor =
                document.createElement("a");

              anchor.href = value;
              anchor.target = "_blank";
              anchor.rel = "noopener noreferrer";
              anchor.textContent = "Open source";

              description.appendChild(anchor);
            } else {
              appendValue(description, value);
            }

            details.append(term, description);
          }
        );

        if (details.children.length > 0) {
          article.appendChild(details);
        }

        return article;
      }

      function renderYearByIndex(index) {
        const safeIndex = Math.max(
          0,
          Math.min(index, years.length - 1)
        );

        const year = years[safeIndex];
        const records = recordsByYear.get(year) || [];

        yearSlider.value = String(safeIndex);
        yearOutput.textContent = `${year} CE`;
        yearHeading.textContent = `${year} CE`;

        works.replaceChildren(
          ...records.map(createWorkCard)
        );

        setStatus(
          `${records.length} ${
            records.length === 1 ? "work" : "works"
          }`
        );
      }

      function setupTimeline() {
        yearSlider.min = "0";
        yearSlider.max = String(years.length - 1);
        yearSlider.step = "1";
        yearSlider.disabled = false;

        rangeStart.textContent = `${years[0]} CE`;

        rangeEnd.textContent =
          `${years[years.length - 1]} CE`;

        renderYearByIndex(0);
      }

      async function loadData() {
        retryButton.hidden = true;
        yearSlider.disabled = true;
        yearHeading.textContent = "Loading";
        works.innerHTML =
          '<p class="empty">Loading data…</p>';

        setStatus("Loading data…");

        try {
          /*
           * One file:
           * data-json="./data.json"
           *
           * Several files:
           * data-json="./data1.json, ./data2.json"
           */
          const configuredPaths =
            (app.dataset.json || "./data.json")
              .split(",")
              .map(value => value.trim())
              .filter(Boolean);

          const payloads = await Promise.all(
            configuredPaths.map(fetchJson)
          );

          const records = payloads.flatMap(
            normalizePayload
          );

          prepareRecords(records);
          setupTimeline();
        } catch (error) {
          console.error(error);

          yearHeading.textContent =
            "Data could not be loaded";

          works.innerHTML = "";
          setStatus(error.message, "error");
          retryButton.hidden = false;
        }
      }

      yearSlider.addEventListener(
        "input",
        event => {
          renderYearByIndex(
            Number(event.target.value)
          );
        }
      );

      retryButton.addEventListener(
        "click",
        loadData
      );

      loadData();
    })();
  </script>
</body>
</html>
