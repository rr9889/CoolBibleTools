<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Headcovering Timeline</title>
  <link rel="icon" href="data:,">

  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f7f7;
      --border: #000000;
      --border-light: #d7d7d7;
      --text: #000000;
      --muted: #555555;
      --faint: #999999;
      --error: #8a1f1f;
      --max-width: 980px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 42px 24px 64px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .site-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.35rem);
      font-weight: 600;
      line-height: 1.2;
    }

    .site-header::after {
      content: "";
      display: block;
      width: 42px;
      height: 1px;
      margin: 16px auto 0;
      background: var(--border);
    }

    .timeline-panel {
      padding: 22px 24px 18px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .timeline-status {
      margin-bottom: 18px;
      color: var(--faint);
      font-size: 0.78rem;
      text-align: right;
    }

    .timeline-status.error {
      color: var(--error);
    }

    #yearSlider {
      width: 100%;
      height: 20px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    #yearSlider:focus {
      outline: none;
    }

    #yearSlider:disabled {
      cursor: wait;
      opacity: 0.45;
    }

    #yearSlider::-webkit-slider-runnable-track {
      width: 100%;
      height: 2px;
      background: var(--border);
    }

    #yearSlider::-webkit-slider-thumb {
      width: 14px;
      height: 14px;
      margin-top: -6px;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
    }

    #yearSlider::-moz-range-track {
      width: 100%;
      height: 2px;
      background: var(--border);
    }

    #yearSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      cursor: pointer;
    }

    .tick-row {
      position: relative;
      height: 16px;
      margin: 2px 7px 0;
    }

    .tick {
      position: absolute;
      top: 2px;
      width: 1px;
      height: 6px;
      background: var(--border-light);
      transform: translateX(-50%);
    }

    .tick.major {
      height: 10px;
      background: var(--border);
    }

    .timeline-range {
      display: flex;
      justify-content: space-between;
      margin-top: 2px;
      color: var(--faint);
      font-size: 0.68rem;
    }

    .details {
      margin-top: 34px;
    }

    #yearHeading {
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 1.35rem;
      font-weight: 600;
    }

    .works {
      display: grid;
      gap: 12px;
    }

    .work-card {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--border-light);
      background: var(--surface);
    }

    .work-card:hover {
      border-color: var(--border);
      background: var(--surface-soft);
    }

    .work-card.core-entry {
      border-color: var(--border);
    }

    .work-image-wrap {
      width: 88px;
      min-height: 112px;
    }

    .work-image {
      display: block;
      width: 88px;
      height: 112px;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      object-fit: cover;
      filter: grayscale(100%);
    }

    .image-fallback {
      display: none;
      width: 88px;
      height: 112px;
      place-items: center;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      color: var(--faint);
      font-size: 0.62rem;
      text-align: center;
      text-transform: uppercase;
    }

    .work-author {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .work-title {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .work-excerpt {
      margin-top: 14px;
      padding: 12px 14px;
      border-left: 2px solid var(--border);
      background: var(--surface-soft);
      color: #333333;
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .work-excerpt::before {
      content: "“";
    }

    .work-excerpt::after {
      content: "”";
    }

    .work-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 3px 8px;
      border: 1px solid var(--border-light);
      color: var(--muted);
      font-size: 0.64rem;
      font-weight: 500;
    }

    .badge.core {
      border-color: var(--border);
      background: var(--text);
      color: #ffffff;
    }

    .work-source {
      display: inline-block;
      margin-top: 13px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      text-decoration: none;
    }

    .message {
      padding: 28px 20px;
      border: 1px solid var(--border-light);
      background: var(--surface-soft);
      color: var(--faint);
      font-size: 0.82rem;
      text-align: center;
    }

    .message.error {
      border-color: var(--error);
      color: var(--error);
    }

    .retry-button {
      margin-top: 14px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
    }

    .retry-button:hover {
      background: var(--text);
      color: #ffffff;
    }

    .retry-button[hidden] {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 14px 48px;
      }

      .timeline-panel {
        padding: 18px 16px 15px;
      }

      .timeline-status {
        text-align: left;
      }

      .work-card {
        grid-template-columns: 62px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }

      .work-image-wrap,
      .work-image,
      .image-fallback {
        width: 62px;
      }

      .work-image,
      .image-fallback {
        height: 82px;
      }

      .work-author {
        font-size: 0.92rem;
      }

      .work-title,
      .work-excerpt {
        font-size: 0.76rem;
      }
    }
  </style>
</head>

<body>
  <main class="page" id="timelineApp" data-json="./data.json">
    <header class="site-header">
      <h1>Headcovering Timeline</h1>
    </header>

    <section class="timeline-panel">
      <p class="timeline-status" id="timelineStatus">Loading data…</p>

      <input
        type="range"
        id="yearSlider"
        min="0"
        max="0"
        value="0"
        step="1"
        aria-label="Select a timeline year"
        disabled
      >

      <div class="tick-row" id="tickRow" aria-hidden="true"></div>

      <div class="timeline-range">
        <span id="firstYear">—</span>
        <span id="lastYear">—</span>
      </div>
    </section>

    <section class="details">
      <h2 id="yearHeading">Loading</h2>

      <div id="works" class="works" aria-live="polite">
        <p class="message">Loading timeline data…</p>
      </div>

      <button class="retry-button" id="retryButton" type="button" hidden>
        Try again
      </button>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var app = document.getElementById("timelineApp");
      var yearSlider = document.getElementById("yearSlider");
      var firstYear = document.getElementById("firstYear");
      var lastYear = document.getElementById("lastYear");
      var tickRow = document.getElementById("tickRow");
      var timelineStatus = document.getElementById("timelineStatus");
      var yearHeading = document.getElementById("yearHeading");
      var worksContainer = document.getElementById("works");
      var retryButton = document.getElementById("retryButton");

      var viewLabels = {
        material_veil_required: "Material veil required",
        material_veil_expected: "Material veil expected",
        cultural_symbol: "Cultural symbol",
        hair_only: "Hair only",
        no_requirement: "No requirement",
        indirect_witness: "Indirect witness",
        related_dress_evidence: "Related dress evidence"
      };

      var years = [];
      var itemsByYear = {};
      var selectedIndex = 0;

      function setStatus(message, type) {
        timelineStatus.textContent = message;
        timelineStatus.className = type
          ? "timeline-status " + type
          : "timeline-status";
      }

      function formatView(view) {
        if (viewLabels[view]) {
          return viewLabels[view];
        }

        return String(view || "Unknown")
          .replace(/[_-]+/g, " ")
          .replace(/\b\w/g, function (letter) {
            return letter.toUpperCase();
          });
      }

      function getDataUrl() {
        var path = app.getAttribute("data-json") || "./data.json";
        return new URL(path, document.baseURI).href;
      }

      function loadJson() {
        return fetch(getDataUrl(), {
          cache: "no-store",
          headers: {
            Accept: "application/json"
          }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error(
                "Could not load data.json: " +
                  response.status +
                  " " +
                  response.statusText
              );
            }

            return response.text();
          })
          .then(function (text) {
            var payload;

            try {
              payload = JSON.parse(text);
            } catch (error) {
              throw new Error("data.json is not valid JSON");
            }

            if (!payload || !Array.isArray(payload.items)) {
              throw new Error('data.json must contain an "items" array');
            }

            return payload.items;
          });
      }

      function normalizeItem(item) {
        var year = Number(item && item.year);

        if (!item || typeof item !== "object" || !Number.isFinite(year)) {
          return null;
        }

        return {
          year: year,
          author: String(item.author || "Unknown author"),
          work: String(item.work || "Untitled work"),
          view: String(item.view || "unknown"),
          note: String(item.note || ""),
          url: String(item.url || ""),
          image: String(item.image || ""),
          primary: item.primary === true,
          excerpt: String(item.excerpt || "")
        };
      }

      function prepareItems(items) {
        var cleanItems = items
          .map(normalizeItem)
          .filter(Boolean)
          .sort(function (a, b) {
            if (a.year !== b.year) {
              return a.year - b.year;
            }

            return a.author.localeCompare(b.author);
          });

        itemsByYear = {};

        cleanItems.forEach(function (item) {
          if (!itemsByYear[item.year]) {
            itemsByYear[item.year] = [];
          }

          itemsByYear[item.year].push(item);
        });

        years = Object.keys(itemsByYear)
          .map(Number)
          .sort(function (a, b) {
            return a - b;
          });

        if (years.length === 0) {
          throw new Error("No valid dated items were found");
        }
      }

      function createBadge(text, className) {
        var badge = document.createElement("span");
        badge.className = className ? "badge " + className : "badge";
        badge.textContent = text;
        return badge;
      }

      function createImage(item) {
        var wrap = document.createElement("div");
        var image = document.createElement("img");
        var fallback = document.createElement("div");

        wrap.className = "work-image-wrap";

        image.className = "work-image";
        image.alt = item.author ? "Image for " + item.author : "";
        image.loading = "lazy";

        fallback.className = "image-fallback";
        fallback.textContent = "No image";

        function showFallback() {
          image.style.display = "none";
          fallback.style.display = "grid";
        }

        image.addEventListener("error", showFallback);

        if (item.image) {
          image.src = item.image;
        } else {
          showFallback();
        }

        wrap.appendChild(image);
        wrap.appendChild(fallback);

        return wrap;
      }

      function createWorkCard(item) {
        var article = document.createElement("article");
        var content = document.createElement("div");
        var author = document.createElement("h3");
        var work = document.createElement("p");
        var badges = document.createElement("div");

        article.className = item.primary
          ? "work-card core-entry"
          : "work-card";

        author.className = "work-author";
        author.textContent = item.author;

        work.className = "work-title";
        work.textContent = item.work;

        content.appendChild(author);
        content.appendChild(work);

        if (item.excerpt) {
          var excerpt = document.createElement("blockquote");
          excerpt.className = "work-excerpt";
          excerpt.textContent = item.excerpt;
          content.appendChild(excerpt);
        }

        badges.className = "work-badges";
        badges.appendChild(createBadge(formatView(item.view)));

        if (item.note) {
          badges.appendChild(createBadge(item.note));
        }

        if (item.primary) {
          badges.appendChild(createBadge("Core entry", "core"));
        }

        content.appendChild(badges);

        if (item.url) {
          var link = document.createElement("a");
          link.className = "work-source";
          link.href = item.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "Open source";
          content.appendChild(link);
        }

        article.appendChild(createImage(item));
        article.appendChild(content);

        return article;
      }

      function renderSelectedYear() {
        var year = years[selectedIndex];
        var items = itemsByYear[year] || [];

        if (year === undefined) {
          return;
        }

        yearSlider.value = String(selectedIndex);
        yearHeading.textContent = year + " CE";

        setStatus(
          items.length +
            " " +
            (items.length === 1 ? "entry" : "entries")
        );

        worksContainer.innerHTML = "";

        if (items.length === 0) {
          var message = document.createElement("p");
          message.className = "message";
          message.textContent = "No entries are listed for this year.";
          worksContainer.appendChild(message);
          return;
        }

        items.forEach(function (item) {
          worksContainer.appendChild(createWorkCard(item));
        });
      }

      function buildTicks() {
        tickRow.innerHTML = "";

        var denominator = Math.max(years.length - 1, 1);

        years.forEach(function (year, index) {
          var tick = document.createElement("span");
          var percentage = (index / denominator) * 100;

          tick.className = "tick";

          if (
            index === 0 ||
            index === years.length - 1 ||
            index % 5 === 0
          ) {
            tick.className += " major";
          }

          tick.style.left = percentage + "%";
          tick.title = year + " CE";

          tickRow.appendChild(tick);
        });
      }

      function setupTimeline() {
        selectedIndex = 0;

        yearSlider.min = "0";
        yearSlider.max = String(years.length - 1);
        yearSlider.step = "1";
        yearSlider.value = "0";
        yearSlider.disabled = false;

        firstYear.textContent = years[0] + " CE";
        lastYear.textContent = years[years.length - 1] + " CE";

        buildTicks();
        renderSelectedYear();
      }

      function showError(error) {
        console.error(error);

        yearSlider.disabled = true;
        yearHeading.textContent = "Data could not be loaded";

        setStatus("Timeline unavailable", "error");

        worksContainer.innerHTML = "";

        var message = document.createElement("p");
        message.className = "message error";
        message.textContent =
          error.message +
          ". Keep data.json in the same folder as this HTML file.";

        worksContainer.appendChild(message);
        retryButton.hidden = false;
      }

      function initialize() {
        retryButton.hidden = true;
        yearSlider.disabled = true;
        yearHeading.textContent = "Loading";
        firstYear.textContent = "—";
        lastYear.textContent = "—";

        setStatus("Loading data…");

        worksContainer.innerHTML =
          '<p class="message">Loading timeline data…</p>';

        loadJson()
          .then(function (items) {
            prepareItems(items);
            setupTimeline();
          })
          .catch(showError);
      }

      yearSlider.addEventListener("input", function (event) {
        selectedIndex = Number(event.target.value);
        renderSelectedYear();
      });

      retryButton.addEventListener("click", initialize);

      initialize();
    })();
  </script>
</body>
</html>
