<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cool Bible Tools</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --muted: #666666;
      --border: #000000;
      --light-border: #d6d6d6;
      --soft: #f7f7f7;
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 42px 18px 60px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .page {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 600;
      line-height: 1.1;
    }

    .search {
      margin-bottom: 18px;
    }

    #searchBar {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    #searchBar:focus {
      outline: 2px solid var(--border);
      outline-offset: 2px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .file-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .file-link {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--light-border);
      background: #ffffff;
      color: var(--text);
      text-decoration: none;
    }

    .file-link:hover,
    .file-link:focus-visible {
      border-color: var(--border);
      background: var(--soft);
      outline: none;
    }

    .file-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }

    .file-path {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .message {
      padding: 22px 16px;
      border: 1px solid var(--light-border);
      background: var(--soft);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    .message.error {
      border-color: var(--border);
      color: var(--text);
    }

    @media (max-width: 640px) {
      body {
        padding: 28px 12px 44px;
      }

      .topline {
        display: block;
      }

      .topline span {
        display: block;
        margin-bottom: 4px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Cool Bible Tools</h1>

    <div class="search">
      <input
        type="search"
        id="searchBar"
        placeholder="Search pages"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="topline">
      <span id="count">Loading</span>
      <span id="status">Checking files</span>
    </div>

    <ul id="fileList" class="file-list">
      <li class="message">Loading pages...</li>
    </ul>
  </main>

  <script>
    (function () {
      "use strict";

      var username = "rr9889";
      var repo = "CoolBibleTools";

      var apiBase =
        "https://api.github.com/repos/" + username + "/" + repo;

      var pagesBase =
        "https://" + username + ".github.io/" + repo + "/";

      var searchBar = document.getElementById("searchBar");
      var fileList = document.getElementById("fileList");
      var count = document.getElementById("count");
      var status = document.getElementById("status");

      var allFiles = [];

      function encodePath(path) {
        return path
          .split("/")
          .map(encodeURIComponent)
          .join("/");
      }

      function titleFromPath(path) {
        var name = path.split("/").pop() || path;

        return name
          .replace(/\.html?$/i, "")
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, function (letter) {
            return letter.toUpperCase();
          });
      }

      function showMessage(text, className) {
        fileList.innerHTML = "";

        var item = document.createElement("li");
        item.className = className || "message";
        item.textContent = text;

        fileList.appendChild(item);
      }

      function render(files) {
        fileList.innerHTML = "";

        count.textContent =
          files.length === 1
            ? "1 page"
            : files.length + " pages";

        if (files.length === 0) {
          showMessage("No pages found.");
          return;
        }

        var fragment = document.createDocumentFragment();

        files.forEach(function (file) {
          var item = document.createElement("li");

          var link = document.createElement("a");
          link.className = "file-link";
          link.href = file.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";

          var title = document.createElement("h2");
          title.className = "file-title";
          title.textContent = file.title;

          var path = document.createElement("span");
          path.className = "file-path";
          path.textContent = file.path;

          link.appendChild(title);
          link.appendChild(path);

          item.appendChild(link);
          fragment.appendChild(item);
        });

        fileList.appendChild(fragment);
      }

      function filterFiles(value) {
        var query = value.toLowerCase().trim();

        if (!query) {
          render(allFiles);
          return;
        }

        var filtered = allFiles.filter(function (file) {
          return (
            file.title.toLowerCase().includes(query) ||
            file.path.toLowerCase().includes(query)
          );
        });

        render(filtered);
      }

      function loadFiles() {
        fetch(apiBase, {
          headers: {
            Accept: "application/vnd.github+json"
          }
        })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("GitHub repo request failed.");
            }

            return response.json();
          })
          .then(function (repoData) {
            var branch = repoData.default_branch;

            return fetch(
              apiBase +
                "/git/trees/" +
                encodeURIComponent(branch) +
                "?recursive=1",
              {
                headers: {
                  Accept: "application/vnd.github+json"
                }
              }
            );
          })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("GitHub file tree request failed.");
            }

            return response.json();
          })
          .then(function (treeData) {
            if (!Array.isArray(treeData.tree)) {
              throw new Error("No file list found.");
            }

            allFiles = treeData.tree
              .filter(function (item) {
                var path = item.path.toLowerCase();

                return (
                  item.type === "blob" &&
                  path.endsWith(".html") &&
                  path !== "index.html" &&
                  path !== "404.html"
                );
              })
              .map(function (item) {
                return {
                  title: titleFromPath(item.path),
                  path: item.path,
                  url: pagesBase + encodePath(item.path)
                };
              })
              .sort(function (a, b) {
                return a.title.localeCompare(b.title);
              });

            status.textContent = "";
            render(allFiles);
          })
          .catch(function (error) {
            console.error(error);

            allFiles = [];
            count.textContent = "Unable to load";
            status.textContent = "";
            showMessage(
              "Could not load repository pages. Try again later.",
              "message error"
            );
          });
      }

      searchBar.addEventListener("input", function (event) {
        filterFiles(event.target.value);
      });

      searchBar.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          searchBar.value = "";
          render(allFiles);
          searchBar.blur();
        }
      });

      loadFiles();
    })();
  </script>
</body>
</html>
