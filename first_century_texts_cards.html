  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-back: #f7f7f7;
      --border: #000000;
      --border-light: #d0d0d0;
      --text: #000000;
      --text-muted: #555555;
      --text-faint: #999999;
      --card-w: 300px;
      --card-h: 420px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #000;
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-faint);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #000;
      margin: 14px auto 0;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 36px;
    }

    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 5px 12px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn:hover {
      border-color: #000;
      color: #000;
    }

    .filter-btn.active {
      background: #000;
      border-color: #000;
      color: #fff;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Card wrapper */
    .card-wrap {
      perspective: 1200px;
      height: var(--card-h);
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.45, 0.05, 0.55, 0.95);
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* Front face */
    .front {
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .front .corner-bl,
    .front .corner-br {
      display: none;
    }

    .category-chip {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 20px;
    }

    .front-title {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-weight: 600;
      color: #000;
      line-height: 1.35;
      margin-bottom: 12px;
    }

    .front-date {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0;
      font-weight: 400;
    }

    .flip-hint {
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--text-faint);
      position: absolute;
      bottom: 18px;
    }

    /* Back face */
    .back {
      background: var(--surface-back);
      border: 1px solid var(--border);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .back-header {
      background: #000;
      padding: 14px 18px 12px;
      flex-shrink: 0;
    }

    .back-header .back-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .back-header .back-date {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 3px;
    }

    .back-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 16px;
      scrollbar-width: thin;
      scrollbar-color: #bbb transparent;
    }

    .back-body::-webkit-scrollbar {
      width: 3px;
    }

    .back-body::-webkit-scrollbar-thumb {
      background: #ccc;
    }

    .back-body ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .back-body ul li {
      font-size: 0.82rem;
      line-height: 1.55;
      color: #333;
      padding-left: 12px;
      position: relative;
      border-left: 1px solid #ccc;
    }

    .back-body ul li strong {
      color: #000;
      font-weight: 600;
    }

    .back-body ul li em {
      font-style: italic;
      color: #555;
    }

    /* Scroll fade */
    .scroll-fade {
      height: 24px;
      background: linear-gradient(to top, var(--surface-back), transparent);
      flex-shrink: 0;
      pointer-events: none;
    }

    /* No results */
    .no-results {
      text-align: center;
      color: var(--text-faint);
      font-size: 0.9rem;
      grid-column: 1 / -1;
      padding: 40px;
    }

    @media (max-width: 480px) {
      :root {
        --card-w: 280px;
        --card-h: 400px;
      }

      .grid {
        gap: 14px;
      }
    }
  </style>
</head>

    const filteredTexts = texts.filter(t => t.id !== 21);

    // Get unique main sections and full subcategories
    const allSubcats = [...new Set(filteredTexts.map(t => t.subcategory))].sort();

    let activeFilter = 'All'; // Can be 'All' or a subcategory

    function buildFilterBar() {
      const bar = document.getElementById('filterBar');
      bar.innerHTML = '';

      ['All', ...allSubcats].forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          activeFilter = cat;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGrid();
        });
        bar.appendChild(btn);
      });
    }

    function categoryColor(cat) { return '#000'; }
    function categoryTextColor(cat) { return '#999'; }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      const visible = activeFilter === 'All'
        ? filteredTexts
        : filteredTexts.filter(t =>
          t.subcategory === activeFilter ||
          (t.crossListed && t.crossListed.includes(activeFilter))
        );

      if (visible.length === 0) {
        const msg = document.createElement('div');
        msg.className = 'no-results';
        msg.textContent = 'No texts in this category.';
        grid.appendChild(msg);
        return;
      }

      visible.forEach(text => {
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';

        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', `${text.title} — click to flip`);

        // Front
        const front = document.createElement('div');
        front.className = 'face front';

        const blBr = document.createElement('div');
        blBr.className = 'corner-bl';
        const brBr = document.createElement('div');
        brBr.className = 'corner-br';

        const era = document.createElement('div');
        era.className = 'front-era';
        era.textContent = text.subcategory;

        const chip = document.createElement('div');
        chip.className = 'category-chip';
        chip.style.color = categoryTextColor(text.subcategory);
        chip.style.borderColor = categoryTextColor(text.subcategory);
        chip.innerHTML = `<span style="font-size: 11px;">${text.section}</span>`;

        const title = document.createElement('div');
        title.className = 'front-title';
        title.textContent = text.title;

        const date = document.createElement('div');
        date.className = 'front-date';
        date.textContent = text.date;

        const hint = document.createElement('div');
        hint.className = 'flip-hint';
        hint.textContent = '';

        front.appendChild(blBr);
        front.appendChild(brBr);
        front.appendChild(chip);
        front.appendChild(title);
        front.appendChild(date);
        front.appendChild(hint);

        // Back
        const back = document.createElement('div');
        back.className = 'face back';

        const bh = document.createElement('div');
        bh.className = 'back-header';

        bh.innerHTML = `
          <div class="back-title">${text.title}</div>
          <div class="back-date" style="margin-bottom: 6px;">${text.date}</div>
        `;

        const bb = document.createElement('div');
        bb.className = 'back-body';

        const ul = document.createElement('ul');
        text.notes.forEach(note => {
          const li = document.createElement('li');
          li.innerHTML = note;
          ul.appendChild(li);
        });
        bb.appendChild(ul);

        const fade = document.createElement('div');
        fade.className = 'scroll-fade';

        back.appendChild(bh);
        back.appendChild(bb);
        back.appendChild(fade);

        card.appendChild(front);
        card.appendChild(back);

        card.addEventListener('click', () => card.classList.toggle('flipped'));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.classList.toggle('flipped');
          }
        });

        wrap.appendChild(card);
        grid.appendChild(wrap);
      });
    }

    buildFilterBar();
    renderGrid();
  </script>
